name: "CodeQL C Analysis for STM32"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-analyze:
    name: CodeQL Analysis (build + analyze)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            make \
            jq

      - name: Show ARM toolchain version
        run: arm-none-eabi-gcc --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality
          build-mode: manual
          config-file: ./.github/codeql-config.yml

      - name: Build project for CodeQL
        run: |
          set -e
          cd firmware/Debug

          echo "🔨 Building firmware for CodeQL..."
          make -f makefile main-build
          test -f firmware.elf
          echo "✅ Build successful"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:cpp'
          output: results
          upload: false
          wait-for-processing: true

      - name: Filter SARIF results
        uses: advanced-security/filter-sarif@v1
        with:
          patterns: |
            -**/Drivers/**
            -**/Middlewares/**
            -**/AZURE_RTOS/**
            -**/Core/Startup/**
            -**/Debug/**
            -**/Release/**
          input: results/cpp.sarif
          output: results/cpp.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: codeql-sarif-filtered
          path: results/cpp.sarif
          retention-days: 30

      - name: Parse CodeQL results
        id: codeql_results
        if: always()
        run: |
          SARIF="results/cpp.sarif"

          if [ ! -f "$SARIF" ]; then
            echo "⚠️ SARIF not found"
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "warnings=0" >> $GITHUB_OUTPUT
            echo "notes=0" >> $GITHUB_OUTPUT
            echo "status=❌ No results" >> $GITHUB_OUTPUT
            exit 0
          fi

          ERRORS=$(jq '[.runs[].results[] | select(.level=="error")] | length' "$SARIF")
          WARNINGS=$(jq '[.runs[].results[] | select(.level=="warning")] | length' "$SARIF")
          NOTES=$(jq '[.runs[].results[] | select(.level=="note" or .level=="recommendation")] | length' "$SARIF")

          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

          if [ "$ERRORS" -gt 0 ]; then
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Fail on high or critical issues
        if: always()
        run: |
          ERRORS="${{ steps.codeql_results.outputs.errors }}"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Build failed due to $ERRORS high/critical issues"
            exit 1
          fi

          echo "✅ No high/critical issues"

  upload-sarif:
    name: Upload SARIF to GitHub Security
    needs: codeql-analyze
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Download CodeQL SARIF artifact
        uses: actions/download-artifact@v7
        with:
          name: codeql-sarif-filtered
          path: sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif/cpp.sarif
