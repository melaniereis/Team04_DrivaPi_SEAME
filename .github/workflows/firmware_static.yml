name: "CodeQL C Analysis for STM32"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v6

      # Toolchain
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            make \
            jq

      - name: Show ARM toolchain version
        run: arm-none-eabi-gcc --version

      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality
          build-mode: manual
          config-file: ./.github/codeql-config.yml

      # Build firmware
      - name: Build project for CodeQL
        run: |
          set -e
          cd Threadx/Debug

          echo "🔨 Building firmware for CodeQL..."

          make -f makefile main-build

          test -f Threadx.elf

          echo "✅ Build successful"

      # Run CodeQL analysis (do not upload yet)
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:cpp'
          output: results
          upload: false
          wait-for-processing: true

      # Filter SARIF
      - name: Filter SARIF results
        uses: advanced-security/filter-sarif@v1
        with:
          # Generated code intentionally excluded
          patterns: |
            -**/Drivers/**
            -**/Middlewares/**
            -**/AZURE_RTOS/**
            -**/Core/Startup/**
            -**/Debug/**
            -**/Release/**
          input: results/cpp.sarif
          output: results/cpp.sarif

      # Upload FILTERED SARIF to GitHub Security
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/cpp.sarif

      # Keep SARIF as artifact
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: codeql-sarif-filtered
          path: results/cpp.sarif
          retention-days: 30

      # Parse SARIF results
      - name: Parse CodeQL results
        id: codeql_results
        if: always()
        run: |
          SARIF="results/cpp.sarif"

          if [ ! -f "$SARIF" ]; then
            echo "⚠️ SARIF not found"
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "warnings=0" >> $GITHUB_OUTPUT
            echo "notes=0" >> $GITHUB_OUTPUT
            echo "status=❌ No results" >> $GITHUB_OUTPUT
            exit 0
          fi

          ERRORS=$(jq '[.runs[].results[] | select(.level=="error")] | length' "$SARIF")
          WARNINGS=$(jq '[.runs[].results[] | select(.level=="warning")] | length' "$SARIF")
          NOTES=$(jq '[.runs[].results[] | select(.level=="note" or .level=="recommendation")] | length' "$SARIF")

          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

          echo "📊 CodeQL results"
          echo "   High/Critical: $ERRORS"
          echo "   Warnings:      $WARNINGS"
          echo "   Notes:         $NOTES"

          if [ "$ERRORS" -gt 0 ]; then
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
          fi

      # Comment on PR with results
      - name: Comment PR with CodeQL results
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔒 CodeQL Security Analysis Results

            | Severity | Count |
            |----------|-------|
            | **High/Critical** | ${{ steps.codeql_results.outputs.errors }} |
            | **Warnings** | ${{ steps.codeql_results.outputs.warnings }} |
            | **Notes** | ${{ steps.codeql_results.outputs.notes }} |

            **Overall Status**: ${{ steps.codeql_results.outputs.status }}

            **Details**: [View full SARIF report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      # Enforce security gate
      - name: Fail on high or critical issues
        if: always()
        run: |
          ERRORS="${{ steps.codeql_results.outputs.errors }}"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Build failed due to $ERRORS high/critical issues"
            exit 1
          fi

          echo "✅ No high/critical issues"
