name: "CodeQL C Analysis for STM32"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: read
  security-events: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-analyze:
    name: CodeQL Analysis (build + analyze)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            make

      - name: Show ARM toolchain version
        run: arm-none-eabi-gcc --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality
          build-mode: manual
          config-file: ./.github/codeql-config.yml

      - name: Build project for CodeQL
        run: |
          set -e
          cd firmware/Debug
          echo "🔨 Building firmware for CodeQL..."
          make -f makefile main-build
          test -f firmware.elf
          echo "✅ Build successful"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:cpp'
          output: results
          upload: false
          wait-for-processing: true

      - name: Filter SARIF results
        uses: advanced-security/filter-sarif@v1
        with:
          patterns: |
            -**/Drivers/**
            -**/Middlewares/**
            -**/AZURE_RTOS/**
            -**/Core/Startup/**
            -**/Debug/**
            -**/Release/**
            -**/Core/Src/system_stm32u5xx.c/**
          input: results/cpp.sarif
          output: results/cpp.sarif

      - name: Validate static analysis (SARIF gate)
        run: |
          python3 scripts/ci/validate_static_analysis.py \
            --sarif-candidates results/cpp.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-filtered
          path: results/cpp.sarif
          retention-days: 30

  upload-sarif:
    name: Upload SARIF to GitHub Security
    needs: codeql-analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write

    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Download CodeQL SARIF artifact
        uses: actions/download-artifact@v7
        with:
          name: codeql-sarif-filtered
          path: sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif/cpp.sarif
