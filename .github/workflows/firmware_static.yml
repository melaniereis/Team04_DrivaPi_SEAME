name: "CodeQL C Analysis for STM32"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            make \
            jq

      - name: Show ARM toolchain version
        run: arm-none-eabi-gcc --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality
          build-mode: manual
          config-file: ./.github/codeql-config.yml

      - name: Build project for CodeQL
        run: |
          set -e
          cd firmware/Debug
          echo "🔨 Building firmware for CodeQL..."
          make -f makefile main-build
          test -f firmware.elf
          echo "✅ Build successful"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:cpp'
          output: results
          upload: false
          wait-for-processing: true

      - name: Filter SARIF results
        uses: advanced-security/filter-sarif@v1
        with:
          patterns: |
            -**/Drivers/**
            -**/Middlewares/**
            -**/AZURE_RTOS/**
            -**/Core/Startup/**
            -**/Debug/**
            -**/Release/**
            -**/Core/Src/system_stm32u5xx.c
          input: results/cpp.sarif
          output: results/cpp.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/cpp.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-filtered
          path: results/cpp.sarif
          retention-days: 30

      - name: Parse CodeQL results (fail-closed)
        id: codeql_results
        if: always()
        run: |
          SARIF="results/cpp.sarif"

          if [ ! -f "$SARIF" ]; then
            echo "::error::SARIF not found - security evidence missing"
            exit 1
          fi

          ERRORS=$(jq '[.runs[].results[] | select(.level=="error")] | length' "$SARIF")
          WARNINGS=$(jq '[.runs[].results[] | select(.level=="warning")] | length' "$SARIF")
          NOTES=$(jq '[.runs[].results[] | select(.level=="note" or .level=="recommendation")] | length' "$SARIF")

          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

          if [ "$ERRORS" -gt 0 ]; then
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with CodeQL results
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔒 CodeQL Security Analysis Results

            | Severity | Count |
            |----------|-------|
            | **High/Critical** | ${{ steps.codeql_results.outputs.errors }} |
            | **Warnings** | ${{ steps.codeql_results.outputs.warnings }} |
            | **Notes** | ${{ steps.codeql_results.outputs.notes }} |

            **Overall Status**: ${{ steps.codeql_results.outputs.status }}

            **Details**: [View full SARIF report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Fail on high or critical issues
        if: always()
        run: |
          ERRORS="${{ steps.codeql_results.outputs.errors }}"
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Build failed due to $ERRORS high/critical issues"
            exit 1
          fi
          echo "✅ No high/critical issues"
