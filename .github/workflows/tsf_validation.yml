name: TSF Validation (PR)

on:
  workflow_run:
    workflows: ["Unit Tests & TSF Artifacts"]
    types:
      - completed
  push:
  pull_request:

jobs:
  tsf-validation:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
      
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Verification Artifacts
        uses: actions/download-artifact@v4
        with:
          name: verification-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/verification

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install official TSF tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          git clone https://gitlab.com/CodethinkLabs/trustable/trustable.git /tmp/trustable
          cd /tmp/trustable
          git fetch --tags || true
          git checkout 2025.9.16 || git checkout master || echo "Using available branch"
          pip install .
          cd -

      - name: Install local validators
        run: pip install -e Dotstop

      - name: Create temporary symlink to .dotstop.dot
        run: ln -sf Dotstop/.dotstop.dot .dotstop.dot

      - name: Mark TSF items and links as reviewed
        run: |
          # --- SPEED SENSOR ---
          trudag manage set-item SWD-SpeedSensor
          
          # Evidence Linking

          # --- SERVOMOTOR (Actuation) ---
          
          # Traceability
          
          # Evidence Linking

      - name: Run trudag lint
        id: lint
        continue-on-error: true
        run: |
          mkdir -p artifacts
          if trudag manage lint 2>&1 | tee artifacts/trudag-lint.txt; then
            echo "lint_ok=true" >> $GITHUB_OUTPUT
          else
            echo "lint_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Get lint summary
        id: summary
        run: |
          if [ -f artifacts/trudag-lint.txt ]; then
            # Capture first 10 lines and Base64 encode to prevent multiline errors
            CONTENT=$(head -n 10 artifacts/trudag-lint.txt)
            echo "lint_summary=$(echo "$CONTENT" | base64 -w 0)" >> $GITHUB_OUTPUT
          else
            echo "lint_summary=$(echo "No output" | base64 -w 0)" >> $GITHUB_OUTPUT
          fi

      - name: Calculate trust scores
        id: scores
        continue-on-error: true
        run: |
          if trudag score 2>&1 | tee artifacts/trudag-score.txt; then
            echo "score_ok=true" >> $GITHUB_OUTPUT
          else
            echo "score_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Trustable report (publish)
        id: publish
        continue-on-error: true
        run: |
          mkdir -p artifacts/trustable-report
          if trudag publish --output-dir artifacts/trustable-report 2>&1; then
            echo "publish_ok=true" >> $GITHUB_OUTPUT
          elif trudag publish --no-validate --output-dir artifacts/trustable-report 2>&1; then
            echo "publish_ok=true" >> $GITHUB_OUTPUT
          else
            echo "publish_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload TSF artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: tsf-validation-artifacts
          path: |
            artifacts/
            .dotstop.dot
          retention-days: 30

      - name: Comment PR with validation results
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ github.event.workflow_run.pull_requests[0] }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          body: |
            ## 🔍 TSF Validation Results

            | Check | Status |
            |-------|--------|
            | **trudag lint** | ${{ steps.lint.outputs.lint_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **trudag score** | ${{ steps.scores.outputs.score_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **trudag publish** | ${{ steps.publish.outputs.publish_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |

            ### 📋 Lint Output (Snippet)
            ```
            ${{ steps.summary.outputs.lint_summary }}
            ```