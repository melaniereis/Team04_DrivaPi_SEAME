name: TSF Validation (PR)

on:
  pull_request:
  push:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read
  security-events: write

jobs:
  run-tests:
    uses: ./.github/workflows/unit_tests.yml

  tsf-validation:
    needs: [run-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-trustable-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-trustable-

      - name: Install official TSF tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml typing_extensions
          git clone https://gitlab.com/CodethinkLabs/trustable/trustable.git /tmp/trustable
          cd /tmp/trustable
          pip install .
          cd -

      - name: Install local validators
        run: |
          if [ -f "dotstop/setup.py" ] || [ -f "dotstop/pyproject.toml" ]; then
            pip install -e dotstop
          else
            echo "Local dotstop package not found, skipping installation"
          fi

      - name: Download Verification Artifacts (if available)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: verification-artifacts
          path: artifacts/verification

      - name: Download CodeQL Artifacts (if available)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: codeql-sarif-filtered
          path: temp_codeql

      - name: Organize Evidence
        run: |
          mkdir -p artifacts/verification/static_analysis
          if [ -d "temp_codeql" ]; then
            find temp_codeql -name "*.sarif" -type f | head -1 | xargs -I {} cp {} artifacts/verification/static_analysis/codeql.sarif 2>/dev/null || echo "No SARIF files found"
          else
            echo "temp_codeql directory not found, skipping CodeQL artifact organization"
          fi

      - name: Create temporary symlink to .dotstop.dot
        run: |
          if [ -f "dotstop/.dotstop.dot" ]; then
            ln -sf dotstop/.dotstop.dot .dotstop.dot
          else
            echo "Warning: dotstop/.dotstop.dot not found"
          fi

       - name: Run trudag lint
         id: lint
         continue-on-error: true
         run: |
          mkdir -p artifacts/tsf
          if trudag manage lint 2>&1 | tee artifacts/tsf/trudag-lint.txt; then
            echo "lint_ok=true" >> $GITHUB_OUTPUT
          else
            echo "lint_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Get lint summary
        id: summary
        run: |
          if [ -f "artifacts/tsf/trudag-lint.txt" ]; then
            LINT_SUMMARY=$(head -n 20 artifacts/tsf/trudag-lint.txt | sed 's/^/    /')
            echo "lint_summary<<EOF" >> $GITHUB_OUTPUT
            echo "$LINT_SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "lint_summary=No lint output generated" >> $GITHUB_OUTPUT
          fi

      - name: Calculate trust scores
        id: scores
        continue-on-error: true
        run: |
          if trudag score 2>&1 | tee artifacts/tsf/trudag-score.txt; then
            echo "score_ok=true" >> $GITHUB_OUTPUT
          else
            echo "score_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate traceability graph
        id: graph
        continue-on-error: true
        run: |
          mkdir -p artifacts/tsf
          if [ -f ".dotstop.dot" ]; then
            if dot -Tsvg .dotstop.dot -o artifacts/tsf/traceability_graph.svg 2>&1; then
              echo "graph_generated=true" >> $GITHUB_OUTPUT
            else
              echo "graph_generated=false" >> $GITHUB_OUTPUT
              echo "Graph generation failed" > artifacts/tsf/graph_error.txt
            fi
          else
            echo "graph_generated=false" >> $GITHUB_OUTPUT
            echo ".dotstop.dot not found" > artifacts/tsf/graph_error.txt
          fi

      - name: Generate Trustable report (publish)
        id: publish
        continue-on-error: true
        run: |
          mkdir -p artifacts/tsf/trustable-report
          if trudag publish --output-dir artifacts/tsf/trustable-report 2>&1; then
            echo "publish_ok=true" >> $GITHUB_OUTPUT
          elif trudag publish --no-validate --output-dir artifacts/tsf/trustable-report 2>&1; then
            echo "publish_ok=true" >> $GITHUB_OUTPUT
          else
            echo "publish_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload TSF artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: tsf-validation-artifacts
          path: |
            artifacts/tsf
          retention-days: 30

      - name: Comment PR with validation results
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔍 TSF Validation Results

            | Check | Status |
            |-------|--------|
            | **trudag lint** | ${{ steps.lint.outputs.lint_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **trudag score** | ${{ steps.scores.outputs.score_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **trudag publish** | ${{ steps.publish.outputs.publish_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **Traceability Graph** | ${{ steps.graph.outputs.graph_generated == 'true' && '✅ GENERATED' || '❌ FAILED' }} |

            ### 📋 Lint Output
            ```
            ${{ steps.summary.outputs.lint_summary }}
            ```

            **Download artifacts to view**: [TSF Validation Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Traceability graph: `tsf-validation-artifacts/traceability_graph.svg`
            - Full TSF reports in artifact archive
