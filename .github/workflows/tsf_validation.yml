name: TSF Validation (PR)

on:
  pull_request:
  push:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read
  security-events: write

jobs:
  run-tests:
    uses: ./.github/workflows/unit_tests.yml
    permissions:
      contents: read
      pull-requests: write
      checks: write
      actions: read
      security-events: write

  tsf-validation:
    needs: [run-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-trustable-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-trustable-

      - name: Install official TSF tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml typing_extensions
          git clone 1 https://gitlab.com/CodethinkLabs/trustable/trustable.git /tmp/trustable
          cd /tmp/trustable
          pip install .
          cd -

      - name: Install local validators (dotstop)
        run: |
          if [ -f "dotstop/setup.py" ] || [ -f "dotstop/pyproject.toml" ]; then
            pip install -e dotstop
          else
            echo "::error::Local dotstop package not found (required for validation)"
            exit 1
          fi

      - name: Download Verification Artifacts (required)
        uses: actions/download-artifact@v4
        with:
          name: verification-artifacts
          path: artifacts/verification

      - name: Download CodeQL Artifacts (required)
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif-filtered
          path: temp_codeql

      - name: Organize Evidence
        run: |
          mkdir -p artifacts/verification/static_analysis
          if [ -d "temp_codeql" ]; then
            f=$(find temp_codeql -name "*.sarif" -type f | head -1 || true)
            if [ -n "$f" ]; then
              cp "$f" artifacts/verification/static_analysis/codeql.sarif
            else
              echo "::error::No SARIF files found in downloaded CodeQL artifact"
              exit 1
            fi
          else
            echo "::error::temp_codeql directory not found"
            exit 1
          fi

      - name: Create temporary symlink to .dotstop.dot
        run: |
          if [ -f "dotstop/.dotstop.dot" ]; then
            ln -sf dotstop/.dotstop.dot .dotstop.dot
          else
            echo "::error::dotstop/.dotstop.dot not found"
            exit 1
          fi

      - name: Run trudag lint
        id: lint
        run: |
          mkdir -p artifacts/tsf
          trudag manage lint 2>&1 | tee artifacts/tsf/trudag-lint.txt

      - name: Get lint summary
        id: summary
        run: |
          LINT_SUMMARY=$(head -n 20 artifacts/tsf/trudag-lint.txt | sed 's/^/    /')
          echo "lint_summary<<EOF" >> $GITHUB_OUTPUT
          echo "$LINT_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate trust scores
        id: scores
        run: |
          trudag score 2>&1 | tee artifacts/tsf/trudag-score.txt

      - name: Generate traceability graph
        id: graph
        run: |
          mkdir -p artifacts/tsf
          dot -Tsvg .dotstop.dot -o artifacts/tsf/traceability_graph.svg

      - name: Generate Trustable report (publish)
        id: publish
        run: |
          mkdir -p artifacts/tsf/trustable-report
          trudag publish --output-dir artifacts/tsf/trustable-report

      - name: Upload TSF artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: tsf-validation-artifacts
          path: artifacts/tsf
          retention-days: 30

      - name: Comment PR with validation results
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔍 TSF Validation Results

            | Check | Status |
            |-------|--------|
            | **trudag lint** | ${{ steps.lint.outputs.lint_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **trudag score** | ${{ steps.scores.outputs.score_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            | **trudag publish** | ${{ steps.publish.outputs.publish_ok == 'true' && '✅ PASSED' || '❌ FAILED' }} |
            ### 📋 Lint Output
            ```
            ${{ steps.summary.outputs.lint_summary }}
            ```
            ### 📊 Traceability Graph
            ${{ steps.graph.outputs.graph_generated == 'true' && '✅ Graph generated successfully' || '❌ Graph generation failed' }}

            **Download artifacts to view**: [TSF Validation Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Traceability graph: `tsf-validation-artifacts/traceability_graph.svg`
            - Full TSF reports in artifact archive
