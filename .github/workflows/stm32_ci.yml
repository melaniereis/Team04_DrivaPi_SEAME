name: STM32 CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-firmware:
    name: Build full STM32 firmware (compile only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi make

      - name: Show toolchain version
        run: arm-none-eabi-gcc --version

      - name: Build project (full STM32 firmware)
        working-directory: firmware/Debug
        run: |
          set -e
          make -f makefile main-build -j$(nproc)
          if [ ! -f firmware.elf ]; then
            echo "Error: firmware.elf not found, build failed!"
            exit 1
          fi
          echo "Full firmware built: firmware.elf"
          arm-none-eabi-readelf -h firmware.elf || true
          hexdump -C firmware.elf | sed -n '1,4p' || true

      - name: Upload firmware.elf as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: firmware/Debug/firmware.elf

      - name: Comment PR with build result (success)
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        permissions:
          issues: write
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ✅ STM32 CI: firmware.elf was built successfully.

      - name: Comment PR with build result (failure)
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        permissions:
          issues: write
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ❌ STM32 CI: firmware.elf build failed. Check the workflow logs for details.

      - name: Comment commit with build result (success)
        if: ${{ success() && github.event_name == 'push' }}
        uses: actions/github-script@v7
        permissions:
          contents: read
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: "✅ STM32 CI: firmware.elf was built successfully."
            });

      - name: Comment commit with build result (failure)
        if: ${{ failure() && github.event_name == 'push' }}
        uses: actions/github-script@v7
        permissions:
          contents: read
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: "❌ STM32 CI: firmware.elf build failed. Check the workflow logs for details."
            });
