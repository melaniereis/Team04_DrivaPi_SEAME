name: "Unit Tests & TSF Artifacts"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write
  actions: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware_static:
    uses: ./.github/workflows/firmware_static.yml

  unit_tests:
    name: Run Tests & Generate TSF Evidence
    runs-on: ubuntu-latest
    needs: [firmware_static]

    env:
      BUILD_DIR: build/host
      COVERAGE_DIR: build/coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            lcov \
            ruby \
            ruby-dev \
            jq

      - name: Install Ceedling and gcovr
        run: |
          sudo gem install ceedling
          pip3 install gcovr

      - name: Verify tool versions
        run: |
          echo "=== Tool Versions ==="
          gcc --version
          cmake --version || true
          ceedling version
          lcov --version
          gcovr --version

      - name: Run Tests (Master Script)
        shell: bash
        run: |
          chmod +x tests/unit/run_all_tests.sh
          bash tests/unit/run_all_tests.sh 2>&1 | tee test_output.log

      - name: Verify Coverage XML (dotstop compatibility)
        if: always()
        run: |
          echo "Verifying Coverage XML reports for dotstop validator..."
          if [ -d "artifacts/verification/coverage" ]; then
            echo "✓ Coverage artifacts directory found"
            ls -lh artifacts/verification/coverage/*.xml 2>/dev/null && echo "✓ Coverage XML files generated successfully" || echo "⚠ No coverage XML files found"
          else
            echo "⚠ No coverage artifacts directory"
          fi

      - name: Download Static Analysis SARIF (from firmware_static job)
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif-filtered
          path: artifacts/verification/static-analysis



      - name: Verify Baseline in Repository
        if: always()
        run: |
          test -f "tests/verification/coverage/baseline.json" || \
            { echo "::error::Missing baseline.json at tests/verification/coverage/baseline.json"; exit 1; }

      - name: Run LLTC Coverage Validation (ASIL A/QM gate = 90% line-rate)
        if: always()
        run: |
          python3 scripts/ci/validate_lltc_coverage.py \
            --base-dir artifacts/verification/coverage \
            --suites dc-motor servo-motor speed-sensor \
            --baseline tests/verification/coverage/baseline.json \
            --min-line-rate 90.0

      - name: Static Analysis Validation (fail-closed)
        if: always()
        run: |
          python3 scripts/ci/validate_static_analysis.py --base-dir artifacts/verification/static-analysis

      - name: Upload Verification Artifacts (TSF)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: verification-artifacts
          path: artifacts/verification
          retention-days: 30

      - name: Upload Coverage HTML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: build/coverage/html
          retention-days: 30

      - name: Upload Static Analysis SARIF
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: static-analysis-sarif
          path: artifacts/verification/static-analysis/*.sarif
          if-no-files-found: error
          retention-days: 30

      - name: Post Test Results
        if: always()
        run: |
          bash scripts/ci/summarize_test_results.sh test_output.log "LLTC Coverage Validation Summary.txt" > test_summary.txt
          cat test_summary.txt
