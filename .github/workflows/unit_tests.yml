name: "Unit Tests & TSF Artifacts"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write
  actions: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware_static:
    uses: ./.github/workflows/firmware_static.yml

  unit_tests:
    name: Run Tests & Generate TSF Evidence
    runs-on: ubuntu-latest
    needs: [firmware_static]

    env:
      BUILD_DIR: build/host
      COVERAGE_DIR: build/coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            lcov \
            ruby \
            ruby-dev

      - name: Install Ceedling and gcovr
        run: |
          sudo gem install ceedling
          pip3 install gcovr

      - name: Verify tool versions
        run: |
          echo "=== Tool Versions ==="
          gcc --version
          cmake --version
          ceedling version
          lcov --version
          gcovr --version

      - name: Run Tests (Master Script)
        run: |
          chmod +x tests/unit/run_all_tests.sh
          bash tests/unit/run_all_tests.sh 2>&1 | tee test_output.log

      - name: Verify Coverage XML (dotstop compatibility)
        if: always()
        run: |
          echo "Verifying Coverage XML reports for dotstop validator..."
          if [ -d "artifacts/verification/coverage" ]; then
            echo "✓ Coverage artifacts directory found"
            ls -lh artifacts/verification/coverage/*.xml 2>/dev/null && echo "✓ Coverage XML files generated successfully" || echo "⚠ No coverage XML files found"
          else
            echo "⚠ No coverage artifacts directory"
          fi

      - name: Download Static Analysis SARIF (from firmware_static job)
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: codeql-sarif-filtered
          path: artifacts/verification/static-analysis

      - name: Upload Coverage XML (for dotstop validator)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml-reports
          path: artifacts/verification/coverage/*.xml
          retention-days: 30

      - name: Generate Coverage Baseline (default branch)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "Generating coverage baseline JSON on default branch: ${{ github.ref_name }}"
            python3 scripts/ci/generate_coverage_baseline.py --base-dir artifacts/verification/coverage --suites dc-motor servo-motor speed-sensor

      - name: Upload Coverage Baseline
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-artifact@v6
        with:
          name: coverage-baseline
          path: artifacts/verification/coverage/baseline.json
          retention-days: 30

      - name: Download Coverage Baseline (from default branch)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: unit_tests.yml
          workflow_conclusion: success
          branch: ${{ github.event.repository.default_branch }}
          name: coverage-baseline
          path: artifacts/verification/coverage

      - name: Generate Coverage Approvals (PR labels)
        if: github.event_name == 'pull_request'
        run: |
          LABELS=$(jq -r '.pull_request.labels | map(.name | ascii_downcase) | join(",")' "$GITHUB_EVENT_PATH")
          SHA=${{ github.sha }}
          bash scripts/ci/generate_coverage_approvals.sh "$LABELS" "$SHA" artifacts/verification/coverage/approvals.json

      - name: Run LLTC Coverage Validation (per-suite, with baseline & approvals)
        if: always()
        run: |
          echo "Validating per-suite coverage changes vs baseline (approval required on change)"
            python3 scripts/ci/validate_lltc_coverage.py --base-dir artifacts/verification/coverage --suites dc-motor servo-motor speed-sensor --min-line-rate 90

      - name: Upload Verification Artifacts (TSF)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: verification-artifacts
          path: artifacts/verification
          retention-days: 30

      - name: Upload Coverage HTML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: build/coverage/html
          retention-days: 30

      - name: Static Analysis Validation (optional)
        if: always()
        run: |
          echo "Checking for SARIF static analysis results..."
            python3 scripts/ci/validate_static_analysis.py --base-dir artifacts/verification/static-analysis

      - name: Upload Static Analysis SARIF
        if: always()
        run: |
          if ls artifacts/verification/static-analysis/*.sarif 1>/dev/null 2>&1; then
            echo "Found SARIF files, uploading..."
            ls -la artifacts/verification/static-analysis/*.sarif
          else
            echo "No SARIF files found to upload"
          fi

      - name: Post Test Results
        if: always()
        run: |
          bash scripts/ci/summarize_test_results.sh test_output.log LLTC\ Coverage\ Validation\ Summary.txt > test_summary.txt
          cat test_summary.txt
