name: "Unit Tests & TSF Artifacts"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_tests:
    name: Run Tests & Generate TSF Evidence
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build/host
      COVERAGE_DIR: build/coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            lcov \
            ruby \
            ruby-dev \
            python3-pip

      - name: Install Ceedling and gcovr
        run: |
          sudo gem install ceedling
          pip3 install gcovr

      - name: Verify tool versions
        run: |
          echo "=== Tool Versions ==="
          gcc --version
          cmake --version
          ceedling version
          lcov --version
          gcovr --version

      - name: Run Tests (Master Script)
        run: |
          chmod +x tests/unit/run_all_tests.sh
          bash tests/unit/run_all_tests.sh 2>&1 | tee test_output.log

      - name: Validate LLTC coverage (baseline gate)
        run: |
          python3 scripts/ci/validate_lltc_coverage.py \
            --base-dir artifacts/verification/coverage \
            --suites dc-motor servo-motor speed-sensor \
            --baseline tests/verification/coverage/baseline.json \
            --min-line-rate 90.0

      - name: Upload Verification Artifacts (TSF)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: verification-artifacts
          path: artifacts/verification
          retention-days: 30

      - name: Upload Coverage HTML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: build/coverage/html
          retention-days: 30

      - name: Generate unit test summary (markdown)
        if: always()
        run: |
          chmod +x scripts/ci/summarize_test_results.sh
          if ! scripts/ci/summarize_test_results.sh test_output.log "LLTC Coverage Validation Summary.txt" > unit_test_summary.md; then
            echo "### 🧪 Unit Test Results" > unit_test_summary.md
            echo "" >> unit_test_summary.md
            echo "⚠️ Failed to generate unit test summary from logs." >> unit_test_summary.md
          fi
          cat unit_test_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test summary artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-summary
          path: unit_test_summary.md
          retention-days: 30
