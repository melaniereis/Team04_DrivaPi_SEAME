---
:project:
  :use_mocks: TRUE
  :use_test_preprocessor: :none
  :use_deep_preprocessor: :none
  :use_backtrace: :simple
  :use_decorators: :auto
  :build_root: build
  :test_file_prefix: test_
  :default_tasks:
    - test:all
  :test_threads: 8
  :compile_threads: 8
  :release_build: FALSE

:mixins:
  :enabled: []
  :load_paths: []

:test_build:
  :use_assembly: FALSE

:release_build:
  :output: MyApp.out
  :use_assembly: FALSE
  :artifacts: []

:plugins:
  :load_paths: []
  :enabled:
    - gcov
    - module_generator
    - report_tests_log_factory

:report_tests_log_factory:
  :reports:
    - junit

:extension:
  :executable: .out

:paths:
  :test:
    - +:test/**
  :source: []
  :include:
    - ../common/support
    - ../../../firmware/Core/Inc/**
  :support:
    - ../common/support
  :libraries: []

:flags:
  :test:
    :compile:
      :*:
        - --coverage
    :link:
      :*:
        - --coverage
  :gcov:
    :compile:
      - --coverage
    :link:
      - --coverage

:files:
  :test: []
  :source: []

:defines:
  :test:
    - TEST
  :release: []
  :use_test_definition: FALSE

:cmock:
  :plugins:
    - :ignore
    - :callback
  :verbosity: 2
  :when_no_prototypes: :warn
  :mock_prefix: 'mock_'
  :mock_suffix: ''
  :treat_as:
    uint8_t: HEX8
    uint16_t: HEX16
    uint32_t: UINT32
    int8_t: INT8
    int16_t: INT16
    int32_t: INT32
    bool: UINT8
  :memcmp_if_unknown: true
  :when_ptr: :compare_data
  :weak: ''
  :enforce_strict_ordering: true
  :fail_on_unexpected_calls: true
  :callback_include_count: true
  :callback_after_arg_check: false
  :exclude_setjmp_h: false

:gcov:
  :summaries: TRUE
  :report_task: FALSE
  :utilities:
    - gcovr
  :reports:
    - HtmlBasic
  :gcovr:
    :html_medium_threshold: 75
    :html_high_threshold: 90

:libraries:
  :placement: :end
:report_tests_log_factory:
  :reports:
    - junit

:gcov:
  :summaries: TRUE
  :report_task: FALSE
  :utilities:
    - gcovr
  :reports:
    - HtmlBasic
  :gcovr:
    :html_medium_threshold: 75
    :html_high_threshold: 90

:libraries:
  :placement: :end
