---
:project:
  :use_mocks: TRUE
  :use_test_preprocessor: :none
  :use_deep_preprocessor: :none
  :use_backtrace: :simple
  :use_decorators: :auto
  :build_root: build
  :test_file_prefix: test_
  :default_tasks:
    - test:all
  :test_threads: 8
  :compile_threads: 8
  :release_build: FALSE

:mixins:
  :enabled: []
  :load_paths: []

:test_build:
  :use_assembly: FALSE

:release_build:
  :output: MyApp.out
  :use_assembly: FALSE
  :artifacts: []

:plugins:
  :load_paths: []
  :enabled:
    - gcov
    - module_generator
    - report_tests_log_factory

:report_tests_log_factory:
  :reports:
    - junit

:extension:
  :executable: .out

:paths:
  :test:
    - +:test/**
    - -:test/support
  :source: []
  :include:
    - test/support
    - ../../../firmware/Core/Inc/**
  :support:
    - test/support
  :libraries: []

:flags:
  :test:
    :compile:
      :*:
        - --coverage
    :link:
      :*:
        - --coverage
  :gcov:
    :compile:
      - --coverage
    :link:
      - --coverage

:files:
  :test: []
  :source:
    - ../../../firmware/Core/Src/speed_sensor.c

:defines:
  :test:
    - TEST
  :release: []
  :use_test_definition: FALSE

:cmock:
  :plugins:
    - :ignore
    - :callback
  :verbosity: 2
  :when_no_prototypes: :warn
  :skeleton_path: ''
  :mock_prefix: 'mock_'
  :mock_suffix: ''
  :strippables: ['(?:__attribute__\s*\([ (]*.*?[ )]*\)+)']
  :attributes:
     - __ramfunc
     - __irq
     - __fiq
     - register
     - extern
  :c_calling_conventions:
     - __stdcall
     - __cdecl
     - __fastcall
  :treat_externs: :exclude
  :treat_inlines: :exclude
  :treat_as:
    uint8: HEX8
    uint16: HEX16
    uint32: UINT32
    int8: INT8
    bool: UINT8
    TIM_HandleTypeDef: UINT32
    UART_HandleTypeDef: UINT32
  :memcmp_if_unknown: true
  :when_ptr: :compare_data
  :weak: ''
  :enforce_strict_ordering: true
  :fail_on_unexpected_calls: true
  :callback_include_count: true
  :callback_after_arg_check: false
  :exclude_setjmp_h: false

:unity:
  :defines:
    - UNITY_INCLUDE_FLOAT
    - UNITY_INCLUDE_DOUBLE

:environment: []

:libraries:
  :placement: :end
  :flag: "-l${1}"
  :path_flag: "-L ${1}"
  :system: []
  :test: []
  :release: []

:gcov:
  :summaries: TRUE
  :report_task: FALSE
  :utilities:
    - gcovr
  :reports:
    - HtmlBasic
  :gcovr:
    :html_medium_threshold: 75
    :html_high_threshold: 90
  :report_generator: :gcovr
  :gcov_reports:
    - HtmlDetailed
  :branch_coverage: TRUE
